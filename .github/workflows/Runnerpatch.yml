name: Godot Self-Patching iOS Editor Build

on:
  workflow_dispatch: # Allows you to tap a button on your iPad to manually launch the compile

jobs:
  ios-editor-compile:
    runs-on: macos-15 # Uses Xcode 16+ images containing the required Clang 16 compiler natively
    steps:
      - name: Checkout Your Forked Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: master

      - name: Force Select Xcode 16 Toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Setup Python Environment
        uses: actions/setup-python@v5 # Fixed: Removed the duplicate "actions/" prefix
        with:
          python-version: '3.11'

      - name: Install SCons and Vulkan Engine Dependencies
        run: |
          python -m pip install scons
          brew install vulkan-headers

      # NOTE: Ensure you manually added the single-thread C++ patch inside platform/ios/os_ios.mm 
      # on your GitHub browser tab before running this step to prevent runtime sandbox crashes!
      - name: Compile Patched Engine Backend & Mobile Touch UI
        run: |
          scons platform=ios target=editor arch=arm64 vsproj=no tests=no

      - name: Package Framework into Valid IPA Bundle
        run: |
          mkdir -p payload/Godot.app
          cp -r bin/godot.ios.editor.* payload/Godot.app/
          zip -r Godot_iPad_Editor.ipa payload/

      - name: Export Final Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-Native-iPad-Editor
          path: Godot_iPad_Editor.ipa
