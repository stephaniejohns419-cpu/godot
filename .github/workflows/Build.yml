name: Build Custom Godot iOS Engine
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install scons
          brew install xcbeautify

      - name: Compile Godot Engine for iOS
        run: |
          scons platform=ios target=template_debug generate_bundle=yes arch=arm64 dev_build=yes module_mono=no module_openxr=no module_webxr=no | xcbeautify

      - name: Assemble IPA Bundle Framework
        run: |
          mkdir -p Payload
          cp -r bin/*.app Payload/GodotEditor.app
          zip -r CustomGodotEngine.ipa Payload/

      - name: Upload Finished Engine IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-engine
          path: CustomGodotEngine.ipa

