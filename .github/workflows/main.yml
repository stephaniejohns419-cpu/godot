name: Custom Native Godot iPad Compiler

on:
  workflow_dispatch: # Allows manual trigger from your iPad browser

jobs:
  compile-ios-editor:
    runs-on: macos-14 # Uses Apple Silicon M-series cloud runners for maximum speed
    steps:
      - name: Checkout Master Repository
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: master

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons and Dependencies
        run: |
          python -m pip install scons
          brew install vulkan-headers # Needed for high-end 3D rendering pipelines

      - name: Compile Engine Backend & Mobile Touch UI
        run: |
          scons platform=ios target=editor arch=arm64 vsproj=no production=yes tests=no
          
      - name: Compress App Bundle for Sideloading
        run: |
          mkdir -p payload/Godot.app
          cp -r bin/godot.ios.editor.arm64.framework/ payload/Godot.app/
          zip -r Godot_iPad_Editor.ipa payload/

      - name: Export Final Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-Native-iPad-Editor
          path: Godot_iPad_Editor.ipa
